<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CP Office • Document Upload</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style> .chat-scroll { max-height: 70vh; overflow-y: auto; } </style>
</head>
<body class="bg-gray-950 text-gray-200">
  <nav class="bg-gray-900 border-b border-gray-800">
    <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
      <h1 class="text-2xl font-bold flex items-center gap-3">
        <i class="fa-solid fa-shield-halved text-blue-500"></i>
        CP OFFICE - DOCQA
      </h1>
      <div class="flex gap-8 text-sm">
        <a href="/" class="flex items-center gap-2 hover:text-blue-400"><i class="fa-solid fa-upload"></i> Upload Document</a>
        <a href="/chat/" class="flex items-center gap-2 hover:text-blue-400"><i class="fa-solid fa-comments"></i> Chat with Documents</a>
      </div>
    </div>
  </nav>

  <div class="max-w-7xl mx-auto p-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
      <!-- Upload Card -->
      <div class="bg-gray-900 rounded-3xl p-10">
        <h2 class="text-3xl font-semibold mb-6 flex items-center gap-3">
          <i class="fa-solid fa-cloud-upload text-emerald-500"></i> Upload New Document
        </h2>
        <div id="dropzone" class="border-4 border-dashed border-blue-500 rounded-3xl h-96 flex flex-col items-center justify-center hover:border-emerald-400 transition cursor-pointer">
          <i class="fa-solid fa-file-pdf text-7xl text-blue-500 mb-6"></i>
          <p class="text-2xl font-medium">Drop PDF or Image here</p>
          <p class="text-gray-400 mt-3">or</p>
          <label class="mt-6 px-8 py-4 bg-blue-600 hover:bg-blue-700 rounded-2xl cursor-pointer text-lg">
            Browse Files
            <input type="file" id="file-input" accept=".pdf,.jpg,.jpeg,.png" class="hidden">
          </label>
        </div>
        <button onclick="startProcessing()" id="process-btn" class="mt-8 w-full py-5 bg-emerald-600 hover:bg-emerald-700 rounded-3xl font-bold text-xl flex items-center justify-center gap-3">
          <i class="fa-solid fa-cogs"></i>
          <span id="btn-text">Process with Surya OCR</span>
        </button>
      </div>

      <!-- Processed Documents -->
      <div class="bg-gray-900 rounded-3xl p-8">
        <h2 class="text-2xl font-semibold mb-6">Processed Documents</h2>
        <div id="docs-list" class="space-y-3"></div>
      </div>
    </div>
  </div>

  <script>
    async function loadProcessedDocs() {
      const res = await fetch('/api/documents/');
      const data = await res.json();
      const container = document.getElementById('docs-list');
      container.innerHTML = data.documents.map(doc => `
        <div class="flex justify-between items-center bg-gray-800 rounded-2xl p-4">
          <div>
            <i class="fa-solid fa-file-lines text-blue-400"></i>
            <span class="ml-3 font-medium">${doc.display_name}</span>
          </div>
          <a href="/chat/" class="text-blue-400 hover:text-blue-300 text-sm font-medium">Chat →</a>
        </div>
      `).join('');
    }
    loadProcessedDocs();

    // Upload logic (same as before, slightly cleaned)
    async function uploadFile(file) {
      const formData = new FormData();
      formData.append('file', file);
      document.getElementById('btn-text').innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> Processing...`;
      const res = await fetch('/api/upload/', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.status === 'success') {
        alert(`:white_check_mark: ${data.filename} processed successfully!`);
        loadProcessedDocs();
      } else {
        alert(data.message);
      }
      document.getElementById('btn-text').innerHTML = `<i class="fa-solid fa-cogs"></i> Process with Surya OCR`;
    }
    function startProcessing() {
      const input = document.getElementById('file-input');
      if (input.files.length) uploadFile(input.files[0]);
    }
    // Drag & Drop + click (same as your old code)
    const dropzone = document.getElementById('dropzone');
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('border-emerald-400'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('border-emerald-400'));
    dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('border-emerald-400'); if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]); });
    document.getElementById('file-input').addEventListener('change', e => { if (e.target.files.length) uploadFile(e.target.files[0]); });
  </script>
</body>
</html>
